<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f0f0f">
  <title>Budget · Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f0f0f;
      --surface:  #1a1a1a;
      --surface2: #222222;
      --border:   #2e2e2e;
      --text:     #f0ede8;
      --muted:    #666;
      --muted2:   #444;
      --accent:   #e8973a;
      --radius:   16px;
      --font:     -apple-system, "SF Pro Display", "Helvetica Neue", sans-serif;

      /* Categorical palette — warm, distinct, dark-friendly */
      --c0: #e8973a;  /* amber       — food/groceries */
      --c1: #e05e5e;  /* coral       — dining */
      --c2: #5b9cf6;  /* sky blue    — transport */
      --c3: #6ecf8f;  /* mint        — health */
      --c4: #b07ef8;  /* lavender    — home */
      --c5: #f0c040;  /* gold        — fun */
      --c6: #f08080;  /* salmon      — clothing */
      --c7: #888888;  /* stone       — other */
    }

    html { background: var(--bg); color: var(--text); font-family: var(--font); }

    body {
      min-height: 100dvh;
      padding: max(env(safe-area-inset-top), 20px) 18px max(env(safe-area-inset-bottom), 32px);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .back-link {
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .back-link:hover { color: var(--text); }

    .page-title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── Month picker ── */
    .month-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 28px;
    }

    .month-nav {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 20px;
      cursor: pointer;
      padding: 4px 10px;
      border-radius: 8px;
      transition: color 0.15s, background 0.15s;
      line-height: 1;
    }
    .month-nav:hover { color: var(--text); background: var(--surface); }
    .month-nav:disabled { opacity: 0.2; cursor: default; background: none; }

    .month-label {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      min-width: 180px;
      text-align: center;
    }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 20px;
      margin-bottom: 14px;
    }

    .card-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 18px;
    }

    /* ── Donut hero ── */
    .donut-wrap {
      position: relative;
      width: 200px;
      height: 200px;
      margin: 0 auto 24px;
    }

    .donut-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .donut-total {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -1px;
      color: var(--text);
      line-height: 1;
    }

    .donut-currency {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
      letter-spacing: 0.04em;
    }

    /* ── Category list ── */
    .cat-list { display: flex; flex-direction: column; gap: 10px; }

    .cat-row {
      display: grid;
      grid-template-columns: 14px 1fr auto;
      align-items: center;
      gap: 10px;
    }

    .cat-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .cat-bar-wrap {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .cat-name {
      font-size: 13px;
      color: var(--text);
      text-transform: capitalize;
    }

    .cat-bar-bg {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .cat-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    .cat-amount {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      text-align: right;
      white-space: nowrap;
    }

    /* ── Bar chart ── */
    .chart-wrap { position: relative; height: 200px; }

    /* ── Who split ── */
    .split-row {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .split-person {
      display: grid;
      grid-template-columns: 56px 1fr 64px;
      align-items: center;
      gap: 12px;
    }

    .split-name {
      font-size: 13px;
      color: var(--muted);
      text-align: right;
    }

    .split-bar-bg {
      height: 8px;
      background: var(--surface2);
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .split-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    .split-amount {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    /* ── Stat pills ── */
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .stat-pill {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
    }

    .stat-value {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--accent);
    }

    .stat-label {
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
    }

    /* ── Empty / loading ── */
    .empty {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      padding: 32px 0;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 32px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; animation: none !important; }
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <a href="/" class="back-link">← Log</a>
    <span class="page-title">Dashboard</span>
    <span style="width:48px"></span>
  </div>

  <!-- Month picker -->
  <div class="month-row">
    <button class="month-nav" id="btn-prev" onclick="changeMonth(-1)">‹</button>
    <span class="month-label" id="month-label">—</span>
    <button class="month-nav" id="btn-next" onclick="changeMonth(1)">›</button>
  </div>

  <!-- Stat pills -->
  <div class="stats-row">
    <div class="stat-pill">
      <div class="stat-value" id="stat-total">—</div>
      <div class="stat-label">total this month</div>
    </div>
    <div class="stat-pill">
      <div class="stat-value" id="stat-daily">—</div>
      <div class="stat-label">avg per day</div>
    </div>
  </div>

  <!-- Donut + category breakdown -->
  <div class="card">
    <div class="card-label">By category</div>
    <div id="donut-section">
      <div class="spinner"></div>
    </div>
  </div>

  <!-- Month-over-month -->
  <div class="card">
    <div class="card-label">Month over month</div>
    <div id="mom-section">
      <div class="spinner"></div>
    </div>
  </div>

  <!-- Who split -->
  <div class="card">
    <div class="card-label">Who spent what</div>
    <div id="who-section">
      <div class="spinner"></div>
    </div>
  </div>

  <script>
    const CAT_COLORS = {
      food:      '#e8973a',
      dining:    '#e05e5e',
      transport: '#5b9cf6',
      health:    '#6ecf8f',
      home:      '#b07ef8',
      fun:       '#f0c040',
      clothing:  '#f08080',
      other:     '#888888',
    };

    function catColor(cat) {
      return CAT_COLORS[cat] || '#888888';
    }

    // ── State ──
    const now = new Date();
    let year  = now.getFullYear();
    let month = now.getMonth(); // 0-indexed

    const MONTH_NAMES = [
      'January','February','March','April','May','June',
      'July','August','September','October','November','December'
    ];

    function sheetTabName(y, m) {
      return `${MONTH_NAMES[m]} ${y}`;
    }

    function updateMonthLabel() {
      document.getElementById('month-label').textContent = sheetTabName(year, month);
      // Can't go into the future
      const isCurrentMonth = year === now.getFullYear() && month === now.getMonth();
      document.getElementById('btn-next').disabled = isCurrentMonth;
    }

    function changeMonth(delta) {
      month += delta;
      if (month < 0)  { month = 11; year--; }
      if (month > 11) { month = 0;  year++; }
      updateMonthLabel();
      loadDashboard();
    }

    // ── Chart refs (so we can destroy before redrawing) ──
    let donutChart = null;
    let momChart   = null;

    // ── Fetch & render ──
    async function loadDashboard() {
      const tab = sheetTabName(year, month);
      setLoading();

      try {
        const res = await fetch(`/api/dashboard?month=${encodeURIComponent(tab)}&year=${year}`);
        if (!res.ok) throw new Error('fetch failed');
        const data = await res.json();
        renderAll(data, tab);
      } catch(e) {
        showError();
      }
    }

    function setLoading() {
      ['donut-section','mom-section','who-section'].forEach(id => {
        document.getElementById(id).innerHTML = '<div class="spinner"></div>';
      });
      document.getElementById('stat-total').textContent = '—';
      document.getElementById('stat-daily').textContent = '—';
    }

    function showError() {
      ['donut-section','mom-section','who-section'].forEach(id => {
        document.getElementById(id).innerHTML = '<p class="empty">No data</p>';
      });
    }

    function fmt(n) {
      return n.toLocaleString('pl-PL', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
    }

    function renderAll(data, tab) {
      const { categories, monthly_totals, who_split, total, days_in_month } = data;

      // ── Pills ──
      document.getElementById('stat-total').textContent = fmt(total) + ' PLN';
      const daysElapsed = (year === now.getFullYear() && month === now.getMonth())
        ? now.getDate()
        : days_in_month;
      const daily = daysElapsed > 0 ? total / daysElapsed : 0;
      document.getElementById('stat-daily').textContent = fmt(daily) + ' PLN';

      renderDonut(categories, total);
      renderMoM(monthly_totals);
      renderWho(who_split);
    }

    function renderDonut(categories, total) {
      const sec = document.getElementById('donut-section');
      if (!categories || categories.length === 0) {
        sec.innerHTML = '<p class="empty">No expenses this month</p>';
        return;
      }

      sec.innerHTML = `
        <div class="donut-wrap">
          <canvas id="donut-canvas"></canvas>
          <div class="donut-center">
            <span class="donut-total">${fmt(total)}</span>
            <span class="donut-currency">PLN total</span>
          </div>
        </div>
        <div class="cat-list" id="cat-list"></div>
      `;

      if (donutChart) { donutChart.destroy(); donutChart = null; }

      const ctx = document.getElementById('donut-canvas').getContext('2d');
      donutChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: categories.map(c => c.name),
          datasets: [{
            data: categories.map(c => c.total),
            backgroundColor: categories.map(c => catColor(c.name)),
            borderColor: '#0f0f0f',
            borderWidth: 3,
            hoverOffset: 6,
          }]
        },
        options: {
          cutout: '72%',
          plugins: { legend: { display: false }, tooltip: {
            callbacks: {
              label: ctx => ` ${fmt(ctx.parsed)} PLN`
            }
          }},
          animation: { duration: 500 },
        }
      });

      // Category list
      const list = document.getElementById('cat-list');
      const maxVal = categories[0]?.total || 1;
      categories.forEach(c => {
        const pct = Math.round((c.total / total) * 100);
        const barW = Math.round((c.total / maxVal) * 100);
        const row = document.createElement('div');
        row.className = 'cat-row';
        row.innerHTML = `
          <div class="cat-dot" style="background:${catColor(c.name)}"></div>
          <div class="cat-bar-wrap">
            <span class="cat-name">${c.name} <span style="color:var(--muted);font-size:11px">${pct}%</span></span>
            <div class="cat-bar-bg">
              <div class="cat-bar-fill" style="width:${barW}%;background:${catColor(c.name)}"></div>
            </div>
          </div>
          <span class="cat-amount">${fmt(c.total)}</span>
        `;
        list.appendChild(row);
      });
    }

    function renderMoM(monthly_totals) {
      const sec = document.getElementById('mom-section');
      if (!monthly_totals || monthly_totals.length === 0) {
        sec.innerHTML = '<p class="empty">Not enough data yet</p>';
        return;
      }

      sec.innerHTML = '<div class="chart-wrap"><canvas id="mom-canvas"></canvas></div>';

      if (momChart) { momChart.destroy(); momChart = null; }

      // Get all unique categories across months
      const allCats = [...new Set(monthly_totals.flatMap(m => m.categories.map(c => c.name)))];

      const datasets = allCats.map(cat => ({
        label: cat,
        data: monthly_totals.map(m => {
          const found = m.categories.find(c => c.name === cat);
          return found ? found.total : 0;
        }),
        backgroundColor: catColor(cat),
        borderRadius: 4,
        borderSkipped: false,
      }));

      const ctx = document.getElementById('mom-canvas').getContext('2d');
      momChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: monthly_totals.map(m => m.month.split(' ')[0].slice(0, 3)),
          datasets,
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            x: {
              stacked: true,
              grid: { color: 'transparent' },
              ticks: { color: '#666', font: { size: 11 } },
            },
            y: {
              stacked: true,
              grid: { color: '#222' },
              ticks: { color: '#666', font: { size: 11 },
                callback: v => fmt(v),
              },
              border: { color: 'transparent' },
            }
          },
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: ctx => ` ${ctx.dataset.label}: ${fmt(ctx.parsed.y)} PLN`
              }
            }
          },
          animation: { duration: 400 },
        }
      });
    }

    function renderWho(who_split) {
      const sec = document.getElementById('who-section');
      if (!who_split || who_split.length === 0) {
        sec.innerHTML = '<p class="empty">No data</p>';
        return;
      }

      const grandTotal = who_split.reduce((s, w) => s + w.total, 0) || 1;

      sec.innerHTML = '<div class="split-row" id="split-rows"></div>';
      const container = document.getElementById('split-rows');

      who_split.forEach((w, i) => {
        const pct = Math.round((w.total / grandTotal) * 100);
        const color = i === 0 ? '#e8973a' : '#5b9cf6';
        const row = document.createElement('div');
        row.className = 'split-person';
        row.innerHTML = `
          <span class="split-name">${w.who}</span>
          <div class="split-bar-bg">
            <div class="split-bar-fill" style="width:${pct}%;background:${color}"></div>
          </div>
          <span class="split-amount">${fmt(w.total)} <span style="color:var(--muted);font-size:11px;font-weight:400">PLN</span></span>
        `;
        container.appendChild(row);
      });
    }

    // ── Init ──
    updateMonthLabel();
    loadDashboard();
  </script>
</body>
</html>
